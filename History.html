<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>거래 내역</title>
</head>
<body>
    <h1>내 거래 내역</h1>

    <div>
        <label>계좌번호 : </label>
        <input type="number" id="SearchAccount" placeholder="계좌번호를 입력해주세요." />
        <button type="button" id="SearchBtn"> 조회하기</button>
    </div>

    <table border="1" id="HistoryTable" style="display:none; width:100%; margin-top:20px;">
        <thead>
            <tr>
                <th>거래일시</th>
                <th>거래유형</th>
                <th>거래상대</th>
                <th>거래금액</th>
                <th>잔액</th>
            </tr>
        </thead>
        <tbody id="HistoryBody">
        </tbody>
    </table>
    <p id="NoData" style="display: none;">거래 내역이 없습니다.</p>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBclYv7VyLrrZkGKVHV6Vcz1YvBuMr9g7k",
            authDomain: "easylogin-af3e3.firebaseapp.com",
            projectId: "easylogin-af3e3",
            storageBucket: "easylogin-af3e3.firebasestorage.app",
            messagingSenderId: "100919177628",
            appId: "1:100919177628:web:ccd562d2baf27eec9c1859"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        
        onAuthStateChanged(auth, (user) => {
            if (!user) { window.location.href = "login.html"; }
        });

        document.getElementById('SearchBtn').addEventListener('click', async () => {
            const user = auth.currentUser;
            if (!user) { alert("로그인이 필요합니다."); return; }

            const accountNumber = document.getElementById('SearchAccount').value;
            if (!accountNumber) { alert("계좌번호를 입력해주세요."); return; }

            try {
                const res = await fetch(`${API}/history?uid=${user.uid}&accountNumber=${accountNumber}`);

                const data = await res.json();
                if (!res.ok) { alert(data.error); return; }

                const tbody = document.getElementById('HistoryBody');
                const table = document.getElementById('HistoryTable');
                const noData = document.getElementById('Nodata');

                tbody.innerHTML = "";

                if (data.length === 0) {
                    table.style.display = "none";
                    noData.style.display = "block";
                }

                data.forEach(item => {
                    const row = document.createElement('tr');
                    const isPlus = item.거래금액 > 0;

                    row.innerHTML = `
                        <td>${item.거래일시}</td>
                        <td>${item.거래유형}</td>
                        <td>${item.거래상대 || "-"}</td>
                        <td style="color:${isPlus ? 'blue' : 'red'}">
                                ${isPlus ? '+' : ''}${item.거래금액.toLocaleString()}원
                        `;
                })
                
                table.style.display = "table";
                noData.style.display = "none";

            } catch (error) {
                console.error("조회 실패:", error);
                alert("조회 중 오류가 발생했습니다.");
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Page</title>
</head>
<body>
    <form>
        <h1>로그인 성공</h1>
        <div> 계좌비밀번호(6자리) : <input type="password" id="accountPassword" /> </div>
        <button type="submit" id="signUpAccount">계좌 생성하기</button>
    </form>

    <a href="History.html">거래 내역 보기</a>

    <form>
        <h1>계좌 입금</h1>
        <div>계좌 : <input type="number" id="AccountNumber" placeholder="계좌번호" /></div>
        <div>보낼 금액 : <input type="number" id="GetMoney" placeholder="금액을 입력하세요" /></div>
        <button type="button" id="UpMoney">입금하기</button>
    </form>


    <form>
        <h1>계좌 출금</h1>
        <div>계좌 : <input type="number" id="AccountNumber2" placeholder="계좌번호" /></div>
        <div>보낼 금액 : <input type="number" id="GiveMoney" placeholder="금액을 입력하세요" /></div>
        <button type="button" id="DownMoney">출금하기</button>
    </form>

    <form>
        <h1>타 계좌 송금</h1>
        <div>내 계좌번호 : <input type="number" id="MyAccountNumber" placeholder="내 계좌번호" /></div>
        <div>송금할 계좌 : <input type="number" id="TargetNumber" placeholder="송금 할 계좌번호" /></div>
        <div>보낼 금액 : <input type="number" id="SendMoney" placeholder="금액을 입력하세요" /></div>
        <div>계좌비밀번호(6자리) : <input type ="password" id="CheckPassword" /></div>
        <button type="button" id="TransferMoney">입금하기</button>
    </form>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
    import { getFirestore, updateDoc, collection, doc, setDoc, addDoc, serverTimestamp, getDoc, getDocs, query, where, increment, runTransaction } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = {
    apiKey: "AIzaSyBclYv7VyLrrZkGKVHV6Vcz1YvBuMr9g7k",
    authDomain: "easylogin-af3e3.firebaseapp.com",
    projectId: "easylogin-af3e3",
    storageBucket: "easylogin-af3e3.firebasestorage.app",
    messagingSenderId: "100919177628",
    appId: "1:100919177628:web:ccd562d2baf27eec9c1859",
    measurementId: "G-E91YWFGLCG"
  };


    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore(app);
    

    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location.href = "login.html"
        };
    })
    
    function formatDateTime(date = new Date()) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        const hour = String(date.getHours()).padStart(2, '0');
        const min = String(date.getMinutes()).padStart(2, '0');
        return `'${year}년 ${month}월 ${day}일 ${hour}시 ${min}분'`;
        }

// 계좌 생성 기능 //
    document.getElementById('signUpAccount').addEventListener('click', async (event) => {
        event.preventDefault();
        
        const password = document.getElementById('accountPassword').value;
        if (password.length !== 6) {
            alert("비밀번호는 6자리여야 합니다.");
            return;
        }

        const user = auth.currentUser;

        if (!user) {
        alert("로그인이 필요합니다.");
        return; 
    }

        try {
            const userDocRef = doc(db, "user", user.uid); 
            const userDocSnap = await getDoc(userDocRef);
            
            let nickName = "이름 없음";
            if (userDocSnap.exists()) {
                const userData = userDocSnap.data();
                console.log("DB에서 가져온 데이터:", userData);
                nickName = userData.name || "이름 없음";
            } else{
                console.error("ERROR");
            }

            const randomNumber = Math.floor(Math.random() * 10000000000000).toString().padStart(13, '0');
            const docRef = await addDoc(collection(db, "Account"), {
                uid: user.uid,
                회원계좌명: nickName,
                계좌번호: randomNumber,
                Password: password,
                잔액: 0,
                생성일 : formatDateTime()
            });

                console.log("계좌 생성 완료! 문서 ID:", docRef.id);
                alert(`계좌가 생성되었습니다. 번호: ${randomNumber}`);

                } catch (error) {
                console.error("오류 발생: ", error);
            }
        });

            
    const targetAccNum = document.getElementById('AccountNumber').value;

// 입금 기능 //
    document.getElementById('UpMoney').addEventListener('click', async () => {
        const user = auth.currentUser;
        if (!user) {
            alert("로그인이 필요합니다");
            return;
        }

            const moneyInput = document.getElementById('GetMoney');
            let targetAccNum = document.getElementById('AccountNumber').value;
            const amount = parseInt(moneyInput.value);

            if (isNaN(amount) || amount <= 0) { alert("입금액을 확인해주세요."); return; }
            
        try{
        const q = query(collection(db, "Account"), where("계좌번호", "==", targetAccNum));
        const querySnapShot = await getDocs(q);

        if (querySnapShot.empty) { alert("계좌를 찾을 수 없습니다."); return; }

        const accountDoc = querySnapShot.docs[0];
        const accountRef = accountDoc.ref;
        const accountData = accountDoc.data(); // 기존 계좌 정보 데이터 가져오기 //

    // 이름, 계좌 잔액 데이터 가져오기 //
        const nickName = accountData.회원계좌명 || "이름 없음";
        const currentBalance = accountDoc.data().잔액; // 현재 잔액 가져오기


    // 입금 후 잔액 계산 //
        const newBalance = currentBalance + amount;


    // 잔액 업데이트 //
        await updateDoc(accountRef, {
            잔액: increment(amount)
        });

        await addDoc(collection(db, "TransactionHistory"), {
            uid : user.uid,
            회원계좌명: nickName,
            계좌번호: targetAccNum,
            거래금액: amount,
            잔액: newBalance, // 거래 후 잔액
            거래일시: formatDateTime(),
            거래유형: "입금"
        });
        
            if (querySnapShot.empty) {
                alert("생성된 계좌가 없습니다.");
                return;
            }

            alert(`${targetAccNum} 계좌에 ${amount.toLocaleString()}원이 입금되었습니다.`);
            moneyInput.value = "";
        } catch (error) {
            console.error("오류 발생:", error);
            alert("입금 실패");
        }
    });

// 출금 기능 //
    document.getElementById('DownMoney').addEventListener('click', async () => {
        const user = auth.currentUser;
        if (!user) { alert("로그인이 필요합니다"); return; }

        const moneyOutput = document.getElementById('GiveMoney');
        const amount = parseInt(moneyOutput.value);
        let targetAccNum2 = document.getElementById('AccountNumber2').value;

        if (isNaN(amount) || amount <= 0) { alert("출금액을 확인해주세요."); return; }

        try {
            const q = query(collection(db, "Account"), where ("계좌번호", "==", targetAccNum2));
            const querySnapShot = await getDocs(q);

        if (querySnapShot.empty) { alert("해당 계좌가 없습니다."); return; }

    // 기존 계좌 정보 데이터 가져오기 //
        const AccountDoc = querySnapShot.docs[0];
        const AccountRef = AccountDoc.ref;
        const accountData = AccountDoc.data(); 
        
    // 이름, 계좌 잔액 데이터 가져오기 //
        const nickName = accountData.회원계좌명 || "이름 없음";
        const currentBalance = AccountDoc.data().잔액;

        if (currentBalance < amount ) {
        alert(`잔액이 부족합니다. | 현재잔액 : ${currentBalance.toLocaleString()}원` ); return; }

    // 출금 후 잔액 계산 //
        const newBalance = currentBalance - amount; 

    // 잔액 업데이트 //
        await updateDoc(AccountRef, {
            잔액 : increment(-amount)
        });
        
    // 거래 내역 문서 발생 //
        await addDoc(collection(db, "TransactionHistory"), {
            uid: user.uid,
            회원계좌명: nickName,
            계좌번호: targetAccNum2,
            거래금액: -amount,
            잔액: newBalance, // 거래 후 잔액
            거래일시: formatDateTime(),
            거래유형: "출금"
        })
        alert(`${targetAccNum2} 계좌에서 ${amount.toLocaleString()}원이 출금되었습니다.`);
        moneyOutput.value = "";
        } catch (error) {
            console.error("오류 발생", error);
            alert("출금 실패");
        }
    });
    


    // 타 계좌 송금 기능 //
    document.getElementById('TransferMoney').addEventListener('click', async () => {
        const user = auth.currentUser;
        if (!user) { alert("로그인이 필요합니다."); return; } 
    
        const myAccNum = document.getElementById('MyAccountNumber').value;
        const SendAccNum = document.getElementById('TargetNumber').value;
        const amount = Number(document.getElementById('SendMoney').value);
        const Password = document.getElementById('CheckPassword').value;

        if (isNaN(amount) || amount <= 0) { alert("금액을 확인해 주세요."); return; }
        if (myAccNum === SendAccNum) { alert("본인 계좌로는 송금할 수 없습니다."); return; }

        try {
            await runTransaction(db, async (transaction) => {
            // 내 계좌 정보 가져오기 //
                const myQuery = query(collection(db, "Account"), where("계좌번호", "==", myAccNum));
                const mySnap = await getDocs(myQuery);
                if (mySnap.empty) throw "내 계좌를 찾을 수 없습니다.";

                const myDoc = mySnap.docs[0];
                const myData = myDoc.data();

            // 비밀번호 및 잔액 검증
                if (myData.Password !== Password) throw "비밀번호가 일치하지 않습니다.";
                if (myData.잔액 < amount) throw "잔액이 부족합니다."
                
            // 상대 계좌 정보 가져오기
                const SendQuery = query(collection(db, "Account"), where("계좌번호", "==", SendAccNum));
                const SendSnap = await getDocs(SendQuery);

                const sendDoc = SendSnap.docs[0];
                const sendData = sendDoc.data();


            // 업데이트
                transaction.update(myDoc.ref, { 잔액 : increment(-amount) });
                transaction.update(sendDoc.ref, { 잔액 : increment(amount) });

            // 거래 기록 저장
                const historyRef = collection(db, "TransactionHistory");
                
            // 내 출금 기록
                transaction.set(doc(historyRef), {
                    uid: user.uid,
                    계좌번호: myAccNum,
                    거래상대: sendData.회원계좌명,
                    거래금액: -amount,
                    잔액: Number(myData.잔액) - amount,
                    거래일시: formatDateTime(),
                    거래유형: "송금(출금)"
                });

                transaction.set(doc(historyRef), {
                    uid: sendData.uid,
                    계좌번호: SendAccNum,
                    거래상대: myData.회원계좌명,
                    거래금액: amount,
                    잔액: Number(sendData.잔액) + amount, 
                    거래일시: formatDateTime(),
                    거래유형: "송금(입금)"
                });
            });

            alert("송금이 완료되었습니다!");

        }   catch (error) {
            console.error("송금 실패:", error);
            alert(error)
        }
    });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Page</title>
</head>
<body>
    <form>
        <h1>로그인 성공</h1>
        <div> 계좌비밀번호(6자리) : <input type="password" id="accountPassword" /> </div>
        <button type="submit" id="signUpAccount">계좌 생성하기</button>
    </form>

    <a href="History.html">거래 내역 보기</a>

    <form>
        <h1>계좌 입금</h1>
        <div>계좌 : <input type="number" id="AccountNumber" placeholder="계좌번호" /></div>
        <div>보낼 금액 : <input type="number" id="GetMoney" placeholder="금액을 입력하세요" /></div>
        <button type="button" id="UpMoney">입금하기</button>
    </form>


    <form>
        <h1>계좌 출금</h1>
        <div>계좌 : <input type="number" id="AccountNumber2" placeholder="계좌번호" /></div>
        <div>보낼 금액 : <input type="number" id="GiveMoney" placeholder="금액을 입력하세요" /></div>
        <button type="button" id="DownMoney">출금하기</button>
    </form>

    <form>
        <h1>타 계좌 송금</h1>
        <div>내 계좌번호 : <input type="number" id="MyAccountNumber" placeholder="내 계좌번호" /></div>
        <div>송금할 계좌 : <input type="number" id="TargetNumber" placeholder="송금 할 계좌번호" /></div>
        <div>보낼 금액 : <input type="number" id="SendMoney" placeholder="금액을 입력하세요" /></div>
        <div>계좌비밀번호(6자리) : <input type ="password" id="CheckPassword" /></div>
        <button type="button" id="TransferMoney">입금하기</button>
    </form>

    <a href="request-list.html">의뢰서 페이지 이동하기</a>


    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
    import { getFirestore, updateDoc, collection, doc, setDoc, addDoc, serverTimestamp, getDoc, getDocs, query, where, increment, runTransaction } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = {
    apiKey: "AIzaSyBclYv7VyLrrZkGKVHV6Vcz1YvBuMr9g7k",
    authDomain: "easylogin-af3e3.firebaseapp.com",
    projectId: "easylogin-af3e3",
    storageBucket: "easylogin-af3e3.firebasestorage.app",
    messagingSenderId: "100919177628",
    appId: "1:100919177628:web:ccd562d2baf27eec9c1859",
    measurementId: "G-E91YWFGLCG"
  };


    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore(app);
    
    const API = 'http://localhost:3000/api/account';

    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location.href = "login.html"
        } else {
            localStorage.setItem('uid', user.uid);
        }
    });
    
    function formatDateTime(date = new Date()) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        const hour = String(date.getHours()).padStart(2, '0');
        const min = String(date.getMinutes()).padStart(2, '0');
        return `'${year}년 ${month}월 ${day}일 ${hour}시 ${min}분'`;
        }

// 계좌 생성 기능 //
    document.getElementById('signUpAccount').addEventListener('click', async (event) => {
        event.preventDefault();


        const password = document.getElementById('accountPassword').value;
        if (password.length !== 6) { alert("비밀번호는 6자리여야 합니다"); return; }

        const user = auth.currentUser;
        if (!user) { alert("로그인이 필요합니다."); return; }


        try {
            const res = await fetch(`${API}/create`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ uid: user.uid, password})
            });

            const data = await res.json();
            if (!res.ok) {alert(data.error); return; }

            alert(`계좌가 생성되었습니다. 번호: ${data.accountNumber}`);
        } catch (error) {
            console.error("오류 발생:", error);
            alert("생성 실패")
        };
    });


// 입금 기능 //
    document.getElementById('UpMoney').addEventListener('click', async () => {
        const user = auth.currentUser;
        if (!user) { alert("로그인이 필요합니다"); return; }

        const accountNumber = document.getElementById('AccountNumber').value;
        const amount = parseInt(document.getElementById('GetMoney').value);

        if (!accountNumber) { alert("계좌번호를 입력해주세요."); return; }
        if (isNaN(amount) || amount <= 0) { alert("입금액을 확인해주세요."); return; }

        try {
            const res = await fetch(`${API}/deposit`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ uid: user.uid, accountNumber, amount })
            });

            const contentType = res.headers.get('content-type');
            if (!contentType || !contentType.includes('application/json')) {
                alert("서버 오류: 서버가 실행중인지 확인해주세요.");
                return;
            }

            const data = await res.json();
            if (!res.ok) { alert(data.error); return; }

            alert(`${accountNumber} 계좌에 ${amount.toLocaleString()}원이 입금되었습니다.`);
        } catch (error) {
            console.error(error);
            alert("서버가 실행중인지 확인해주세요.");
        }
    });


// 출금 기능 //
    document.getElementById('DownMoney').addEventListener('click', async () => {
        const user = auth.currentUser;
        if (!user) { alert("로그인이 필요합니다"); return; }

        const accountNumber = document.getElementById('AccountNumber2').value;
        const amount = parseInt(document.getElementById('GiveMoney').value);

        if (isNaN(amount) || amount <= 0) { alert("출금액을 확인해주세요."); return; }
        if (!accountNumber) { alert("계좌번호를 입력해주세요."); return; }
        
        try {
            const res = await fetch(`${API}/withdraw`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json'},
                body: JSON.stringify({ uid: user.uid, accountNumber, amount})
            });

            const contentType = res.headers.get('content-type');
            if (!contentType || !contentType.includes('application/json')) {
                alert("서버 오류: 서버가 실행중인지 확인해주세요.");
                return;
            }

            const data = await res.json();
            if (!res.ok) { alert(data.error); return; }

            alert(`${accountNumber} 계좌에서 ${amount.toLocaleString()}원이 출금되었습니다.`);
            document.getElementById('GiveMoney').value = "";
        } catch (error) {
            console.error("오류 발생:", error);
            alert("출금 실패");
        }
    });
    


    // 송금 기능
    document.getElementById('TransferMoney').addEventListener('click', async () => {
        const user = auth.currentUser;
        if (!user) { alert("로그인이 필요합니다."); return; } 
    
        const myAccountNumber = document.getElementById('MyAccountNumber').value;
        const targetAccountNumber = document.getElementById('TargetNumber').value;
        const amount = Number(document.getElementById('SendMoney').value);
        const password = document.getElementById('CheckPassword').value;

        if(isNaN(amount) || amount <= 0) { alert("금액을 확인해 주세요."); return; }
        if(myAccountNumber === targetAccountNumber) { alert("본인 계좌로는 송금할 수 없습니다."); return; }

        try {
            const res = await fetch(`${API}/transfer`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ uid: user.uid, myAccountNumber, targetAccountNumber, amount, password})
            });

            const data = await res.json();
            if (!res.ok) { alert(data.error); return; }

            alert("송금이 완료되었습니다.");
            document.getElementById('SendMoney').value = "";
            document.getElementById('CheckPassword').value = "";
        } catch (error) {
            console.error("송금 실패:", error);
            alert("송금 실패");
        }
    });
    </script>
</body>
</html>

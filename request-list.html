<!DOCTYPE html>
<html long="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>의뢰서 목록</title>
    <style>
        body { font-family: sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;}
        h1 { margin-bottom: 0px; }
        .btn-new {
            padding: 10px 20px; background-color: #4A90D9; color: white;
            border: none; border-radius: 5px; font-size: 14px; cursor: pointer; text-decoration: none;
        }
        .btn-new:hover { background-color:  #357ABD; }

        /* 탭 */
        .tabs { display: flex; gap: 0; margin-bottom: 0; border-bottom: 2px solid #ddd; }
        .tab-btn {
            padding: 10px 24px; background: none; border: none; font-size: 14px;
            cursor: pointer; color: #888; border-bottom: 3px solid transparent; margin-bottom: -2px;
        }
        .tab-btn.active { color: #4A90D9; border-bottom-color: #4A90D9; font-weight: bold; }
        .tab-btn:hover { color: #4A90D9; }

        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 10px 12px; text-align: center; }
        th { background-color: #f4f4f4; font-weight: bold; }
        tr:hover { background-color: #fafafa; }
        
        .btn-edit {
            padding: 5px 11px; background-color: #4A90D9; color: white;
            border: none; border-radius: 4px; cursor: pointer; font-size: 13px;
        }
        .btn-edit:hover { background-color: #357ABD; }
        .btn-delete {
            padding: 5px 11px; background-color: #e74c3c; color: white;
            border: none; border-radius: 4px; cursor: pointer; font-size: 12px; margin-left: 4px;
        }
        .btn-delete:hover { background-color: #c0392b; }
        .btn-restore {
            padding: 5px 11px; background-color: #27ae60; color: white;
            border: none; border-radius: 4px; cursor: pointer; font-size: 12px;
        }
        .btn-restore:hover { background-color: #219a52; }

        .status-badge {
            display: inline-block; padding: 3px 10px; border-radius: 12px;
            font-size: 12px; font-weight: bold;
        }
        .status-1 { background: #fff3cd; color: #856404; }
        .status-2 { background: #cce5ff; color: #004085; }
        .status-3 { background: #d4edda; color: #155724; }

        .remain-days { font-size: 12px; color: #e74c3c; font-weight: bold; }
        .remain-safe { color: #888; }

        #loading { text-align: center; padding: 40px; color: #888; }
        #error { color: red; text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <div class="top-bar">
        <h1>에어컨 서비스 의뢰서 목록</h1>
        <a class="btn-new" href="request.html">+ 새 의뢰서 등록</a>
    </div>
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('active')">활성 의뢰서</button>
        <button class="tab-btn" onclick="switchTab('deleted')">삭제된 의뢰서</button>
    </div>

    <div id="loading">불러오는 중...</div>
    <div id="error" style="display:none;"></div>

    <!-- 활성 의뢰서 테이블 -->
    <table id="activeTable" style="display:none;">
        <thead>
            <tr>
                <th>고객명</th><th>전화번호</th><th>브랜드</th><th>유형</th>
                <th>서비스</th><th>희망 날짜</th><th>상태</th><th>등록일</th><th>관리</th>
            </tr>
        </thead>
        <tbody id="activeBody"></tbody>
    </table>

    <!-- 삭제된 의뢰서 테이블 -->
    <table id="deletedTable" style="display:none;">
        <thead>
            <tr>
                <th>고객명</th><th>전화번호</th><th>브랜드</th><th>서비스</th>
                <th>삭제일</th><th>복구 가능 기간</th><th>복구</th>
            </tr>
        </thead>
        <tbody id="deletedBody"></tbody>
    </table>
    
    <script>
        const API = 'http://localhost:3000/api/request';
        const STATUS_LABEL = { 1: '접수', 2: '진행중', 3: '완료' };
        let currentTab = 'active';

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                btn.classList.toggle('active', (tab === 'active' && i === 0) || (tab === 'deleted' && i === 1));
            });
            document.getElementById('activeTable').style.display = tab === 'active' ? 'table' : 'none';
            document.getElementById('deletedTable').style.display = tab === 'deleted' ? 'table' : 'none';
            if (tab === 'deleted') loadDeleted();
        }

        async function loadList() {
            const uid = localStorage.getItem('uid');
            if (!uid) { window.location.href = 'login.html'; return; }

            try {
                const res = await fetch(`${API}/list?uid=${uid}`);
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || '목록 조회 실패');

                document.getElementById('loading').style.display = 'none';
                document.getElementById('activeTable').style.display = 'table';

                const tbody = document.getElementById('activeBody');
                tbody.innerHTML = '';

                if (data.requests.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="9" style="color:#888;">등록된 의뢰서가 없습니다.</td></tr>';
                    return ;
                }

                data.requests.forEach(r => {
                    const tr = document.createElement('tr');
                    tr.id = `row-${r.id}`; 
                    tr.innerHTML = `
                        <td>${r.clientName || '-'}</td>
                        <td>${r.customer_phone}</td>
                        <td>${r.brand}</td>
                        <td>${r.aircon_type}</td>
                        <td>${r.service_type}</td>
                        <td>${r.service_date}</td>
                        <td><span class="status-badge status-${r.status}">${STATUS_LABEL[r.status] || '-'}</span></td>
                        <td>${r.created_at}</td>
                        <td>
                            <button class="btn-edit" onclick="goEdit('${r.id}')">수정</button>
                            <button class="btn-delete" onclick="deleteRequest('${r.id}')">삭제</button> 
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                const errEl = document.getElementById('error');
                errEl.style.display = 'block';
                errEl.textContent = '오류: ' + err.message + ' - 서버가 실행 중인지 확인해주세요.';
            }
        }

        async function loadDeleted() {
            const uid = localStorage.getItem('uid');
            const tbody = document.getElementById('deletedBody');
            tbody.innerHTML = '<tr><td colspan="7" style="color:#888;">불러오는 중...</td></tr>';

            try {
                const res = await fetch(`${API}/deleted?uid=${uid}`);
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);

                tbody.innerHTML = '';

                if (data.requests.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="color:#888;">삭제된 의뢰서가 없습니다.</td></tr>';
                    return;
                }

                data.requests.forEach(r => {
                    const isUrgent = r.remainDays <= 3;
                    const tr = document.createElement('tr');
                    tr.id = `del-row-${r.id}`;
                    tr.innerHTML = `
                        <td>${r.clientName || '-'}</td>
                        <td>${r.customer_phone}</td>
                        <td>${r.brand}</td>
                        <td>${r.service_type}</td>
                        <td>${r.deleted_at}</td>
                        <td class="remain-days ${isUrgent ? '' : 'remain-safe'}">
                            ${r.remainDays > 0 ? `${r.remainDays}일 남음` : '만료됨'}
                        </td>
                        <td>
                            ${r.remainDays > 0
                                ? `<button class="btn-restore" onclick="restoreRequest('${r.id}')">복구</button>`
                                : '-'}
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="7" style="color:red;">${err.message}</td></tr>`;
            }
        }

        function goEdit (id) {
            window.location.href = `request-edit.html?id=${id}`;
        }

        async function deleteRequest(id) {
            if (!confirm('의뢰서를 삭제할까요?\n14일 이내에 복구할 수 있습니다.')) return;
 
            const uid = localStorage.getItem('uid');
            try {
                const res = await fetch(`${API}/delete/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ uid })
                });
 
                const data = await res.json();
                if (!res.ok) { alert(data.error); return; }
 
                alert('삭제되었습니다. 14일 이내 [삭제된 의뢰서] 탭에서 복구할 수 있습니다.');
                const row = document.getElementById(`row-${id}`);
                if (row) row.remove();
 
                const tbody = document.getElementById('activeBody');
                if (tbody.children.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="9" style="color:#888;">등록된 의뢰서가 없습니다.</td></tr>';
                }
            } catch (err) {
                alert('서버가 실행 중인지 확인해주세요.');
            }
        }
        
        async function restoreRequest(id) {
            if (!confirm('이 의뢰서를 복구할까요?')) return;
            
            const uid = localStorage.getItem('uid');
            try {
                const res = await fetch(`${API}/restore/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ uid })
                });

                const data = await res.json();
                if (!res.ok) { alert(data.error); return; }

                alert('의뢰서가 복구되었습니다.');
                const row = document.getElementById(`del-row-${id}`);
                if (row) row.remove();
            } catch (err) {
                alert('서버가 실행 중인지 확인해주세요.');
            }
        }

        loadList();
    </script>
</body>
</html>
